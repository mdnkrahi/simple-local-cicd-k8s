apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-html-demo
  labels:
    app: devops-html-demo
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: devops-html-demo
  template:
    metadata:
      labels:
        app: devops-html-demo
    spec:
      containers:
        - name: nginx
          image: ghcr.io/yourusername/devops-html-demo:latest   # <-- Change 'yourusername' to your GitHub username
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10